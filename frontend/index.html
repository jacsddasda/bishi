<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能简历分析系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>智能简历分析系统</h1>
        
        <!-- 简历上传区域 -->
        <div class="section">
            <h2>1. 上传简历</h2>
            <form id="upload-form">
                <input type="file" id="resume-file" accept=".pdf" required>
                <button type="submit">上传并解析</button>
            </form>
        </div>
        
        <!-- 解析结果区域 -->
        <div class="section" id="result-section" style="display: none;">
            <h2>2. 解析结果</h2>
            <div id="parse-result"></div>
        </div>
        
        <!-- 岗位匹配区域 -->
        <div class="section" id="match-section" style="display: none;">
            <h2>3. 岗位匹配</h2>
            <form id="match-form">
                <textarea id="job-description" placeholder="请输入岗位需求描述" required></textarea>
                <button type="submit">计算匹配度</button>
            </form>
            <div id="match-result"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
